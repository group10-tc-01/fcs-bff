apiVersion: apps/v1
kind: Deployment
metadata:
  name: fcs-bff
  namespace: fcs-bff
  labels:
    app.kubernetes.io/name: fcs-bff
    app.kubernetes.io/part-of: fcs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fcs-bff
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fcs-bff
        app.kubernetes.io/part-of: fcs
        tags.datadoghq.com/service: fcs-bff
        tags.datadoghq.com/env: production
      annotations:
        fcs.platform/deployed-at: not-deployed
        fcs.platform/source-sha: not-deployed
        fcs.platform/image: not-deployed
        ad.datadoghq.com/api.checks: |
          {
            "openmetrics": {
              "init_config": {},
              "instances": [{"openmetrics_endpoint": "http://%%host%%:%%port%%/metrics", "namespace": "fcs_bff", "metrics": [".*"]}]
            },
            "http_check": {
              "init_config": {},
              "instances": [{"name": "fcs-bff-health", "url": "http://%%host%%:%%port%%/health", "timeout": 5, "collect_response_time": true}]
            }
          }
    spec:
      containers:
        - name: api
          image: ghcr.io/group10-tc-01/fcs-bff:main
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: bff-config
          env:
            - name: Deployment__DeployedAt
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['fcs.platform/deployed-at']
            - name: Deployment__SourceSha
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['fcs.platform/source-sha']
            - name: Deployment__Image
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['fcs.platform/image']
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
