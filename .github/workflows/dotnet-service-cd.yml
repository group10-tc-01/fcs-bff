name: fcs-bff Delivery To Coolify

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  delivery:
    uses: group10-tc-01/fcs-pipelines/.github/workflows/coolify-image-delivery.yml@main
    with:
      app_name: fcs-bff
      image_registry: ghcr.io
      image_owner: group10-tc-01
      image_name: fcs-bff
      dockerfile_path: src/Fcs.Bff.WebApi/Dockerfile
      docker_context: .
      coolify_base_url: ${{ vars.COOLIFY_BASE_URL }}
      coolify_resource_uuid: ${{ vars.COOLIFY_RESOURCE_UUID }}
    secrets: inherit
